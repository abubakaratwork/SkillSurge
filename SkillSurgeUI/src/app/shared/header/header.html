<header class="bg-white shadow-md sticky top-0 z-50">
  <div class=" mx-auto px-6 py-4 flex items-center justify-between">

    <div class="flex gap-10">
      <div class="text-3xl font-extrabold text-primary tracking-wide cursor-pointer" routerLink="/">
        SkillSurge
      </div>
      <button class="p-2 rounded-md hover:bg-gray-100 transition cursor-pointer" (click)="toggleSidebar.emit()">
        <mat-icon>menu</mat-icon>
      </button>
    </div>

    <nav class="flex items-center space-x-6 text-gray-700 font-medium">

      <button
        class="bg-primary text-white px-3 py-2 rounded-xl font-semibold hover:bg-primary-hover transition-all shadow-md hover:shadow-lg flex items-center justify-center cursor-pointer"
        (click)="logout()">
        <mat-icon>exit_to_app</mat-icon>
      </button>

    </nav>

  </div>
</header>
