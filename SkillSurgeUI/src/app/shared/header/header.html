<header class="w-full bg-white/95 backdrop-blur border-b border-gray-200 sticky top-0 z-50">

  <div class="mx-auto px-6 h-16 flex items-center justify-between">

    <!-- Left Section -->
    <div class="flex items-center gap-6">

      <!-- Sidebar Toggle -->
      <button class="p-2 rounded-lg hover:bg-gray-100 transition flex items-center justify-center cursor-pointer"
        (click)="toggleSidebar.emit()">

        <mat-icon class="text-gray-700">menu</mat-icon>

      </button>

      <!-- Logo -->
      <div class="text-2xl font-bold tracking-tight text-primary cursor-pointer select-none" routerLink="/">

        Skill<span class="text-gray-800">Surge</span>

      </div>

    </div>


    <!-- Right Section -->
    <nav class="flex items-center gap-4">

      <!-- Action Button -->
      @if(navItem){
      <button
        class="flex items-center gap-2 bg-primary text-white px-4 py-2 rounded-lg font-semibold hover:bg-primary-hover transition shadow-sm hover:shadow-md cursor-pointer"
        [routerLink]="navItem?.link">

        {{ navItem?.label }}

      </button>
      }

      <!-- Profile -->
      @if(!isOnAdminDashboard){
      <button
        class="p-2 rounded-full text-primary border border-gray-200 hover:bg-gray-100 hover:border-gray-300 transition flex items-center justify-center cursor-pointer"
        routerLink="/profile">
        <mat-icon class="text-gray-700">person</mat-icon>
      </button>
      }
    </nav>
  </div>

</header>
