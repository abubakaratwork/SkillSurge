<div class="fixed inset-0 backdrop-blur-sm flex items-center justify-center z-50 transition-opacity">
    <div class="bg-white rounded-2xl p-8 w-full max-w-lg relative shadow-lg">

        <!-- Close Button -->
        <span class="absolute top-4 right-4 text-gray-500 text-2xl cursor-pointer hover:text-gray-700 transition-colors"
            (click)="close()">&times;</span>

        <!-- Title -->
        <h2 class="text-2xl font-semibold mb-4 text-gray-800">
            {{ category.id ? 'Edit Category' : 'Add Category' }}
        </h2>

        <form #categoryForm="ngForm" (ngSubmit)="submitForm(categoryForm)" class="space-y-4">

            <!-- Name -->
            <div class="text-left">
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    Name <span class="text-red-500">*</span>
                </label>
                <input type="text" name="name" [(ngModel)]="category.name" required minlength="2" #name="ngModel"
                    placeholder="Enter category name"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition placeholder-gray-400">
                @if(name.invalid && (name.touched || name.dirty)){
                <div [class]="repetitiveStyles.validationErrorText">
                    Name is required and must be at least 2 characters.
                </div>
                }
            </div>

            <!-- Description -->
            <div class="text-left">
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    Description
                </label>
                <textarea name="description" [(ngModel)]="category.description"
                    placeholder="Enter category description (optional)"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition placeholder-gray-400 resize-none h-24">
        </textarea>
            </div>

            <!-- Active -->
            <div class="flex items-center gap-2 text-gray-700">
                <input type="checkbox" name="isActive" [(ngModel)]="category.isActive" class="w-4 h-4 cursor-pointer">
                <label class="text-sm">Active</label>
            </div>

            <!-- Buttons -->
            <div class="flex justify-end gap-2 mt-4">
                <button type="button" (click)="close()"
                    class="px-4 py-2 rounded-lg bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200 transition">
                    Cancel
                </button>

                <button type="submit" [disabled]="categoryForm.invalid"
                    class="px-4 py-2 rounded-lg bg-primary hover:bg-primary-hover text-white font-semibold transition-colors disabled:opacity-60 disabled:cursor-not-allowed">
                    {{ category.id ? 'Update' : 'Create' }}
                </button>
            </div>

        </form>
    </div>
</div>
