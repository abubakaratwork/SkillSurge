<div class="fixed inset-0 backdrop-blur-sm flex items-center justify-center z-50 transition-opacity">

    <div class="bg-white rounded-2xl p-8 w-full max-w-md relative shadow-lg">

        <span
            class="absolute top-4 right-4 text-gray-500 text-2xl cursor-pointer hover:text-gray-700 transition-colors"
            (click)="close()">&times;</span>

        <h2 class="text-2xl font-semibold mb-6 text-gray-800">
            Update User Role
        </h2>

        <form #profileForm="ngForm" (ngSubmit)="submitForm(profileForm)" class="space-y-4">

            <!-- First & Last Name (readonly) -->
            <div class="flex gap-4">
                <div class="flex-1">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        First Name
                    </label>
                    <input
                        type="text"
                        name="firstName"
                        [(ngModel)]="user.firstName"
                        readonly
                        class="w-full px-3 py-2 border border-gray-200 bg-gray-100 rounded-lg cursor-not-allowed">
                </div>

                <div class="flex-1">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        Last Name
                    </label>
                    <input
                        type="text"
                        name="lastName"
                        [(ngModel)]="user.lastName"
                        readonly
                        class="w-full px-3 py-2 border border-gray-200 bg-gray-100 rounded-lg cursor-not-allowed">
                </div>
            </div>

            <!-- Email (readonly) -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                <input
                    type="email"
                    name="email"
                    [(ngModel)]="user.email"
                    readonly
                    class="w-full px-3 py-2 border border-gray-200 bg-gray-100 rounded-lg cursor-not-allowed">
            </div>

            <!-- Role -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    Role <span class="text-red-500">*</span>
                </label>

                <ng-select
                    [items]="roles"
                    bindLabel="name"
                    bindValue="id"
                    [(ngModel)]="user.role"
                    name="role"
                    required
                    placeholder="Select role"
                    class="w-full">

                </ng-select>
            </div>

            <!-- Buttons -->
            <div class="flex justify-end gap-2 mt-4">
                <button
                    type="button"
                    (click)="close()"
                    class="px-4 py-2 rounded-lg bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200 transition">
                    Cancel
                </button>

                <button
                    type="submit"
                    [disabled]="profileForm.invalid"
                    class="px-4 py-2 rounded-lg bg-primary hover:bg-primary-hover text-white font-semibold transition-colors disabled:opacity-60 disabled:cursor-not-allowed">
                    Update Role
                </button>
            </div>

        </form>

    </div>
</div>
