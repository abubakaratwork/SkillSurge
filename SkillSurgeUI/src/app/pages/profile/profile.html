<section class="max-w-lg mx-auto mt-12 p-6 bg-white rounded-2xl shadow-md border border-gray-100">

    <!-- Title -->
    <h2 class="text-2xl font-bold mb-6 text-gray-900 border-b pb-3 border-gray-200">
        Profile
    </h2>

    <div class="space-y-4">

        <!-- Name -->
        <div class="bg-gray-50 p-3 rounded-xl flex gap-4 items-center">
            <div class="flex-1">
                <span class="block text-xs font-semibold text-gray-500 uppercase">First Name</span>
                <p class="mt-1 text-gray-800 font-medium">{{ user.firstName | titlecase}}</p>
            </div>
            <div class="flex-1">
                <span class="block text-xs font-semibold text-gray-500 uppercase">Last Name</span>
                <p class="mt-1 text-gray-800 font-medium">{{ user.lastName | titlecase }}</p>
            </div>
        </div>

        <!-- Email -->
        <div class="bg-gray-50 p-3 rounded-xl">
            <span class="block text-xs font-semibold text-gray-500 uppercase">Email</span>
            <p class="mt-1 text-gray-700 font-medium">{{ user.email }}</p>
        </div>

        <!-- Role -->
        <div class="bg-gray-50 p-3 rounded-xl flex items-center justify-between">
            <span class="text-xs font-semibold text-gray-500 uppercase">Role</span>
            <span class="px-2 py-1 rounded-full text-sm font-medium text-white"
                [class.bg-green-500]="user.role.toLowerCase()==='user'" [class.bg-blue-500]="user.role.toLowerCase()==='admin'">
                {{ user.role | titlecase }}
            </span>
        </div>

    </div>

    <!-- Action Buttons -->
    <div class="flex justify-end gap-3 mt-6">
        <button (click)="editInfo()"
            class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-primary hover:bg-primary-hover text-white font-semibold shadow cursor-pointer">
            <mat-icon>edit</mat-icon>
            Edit Info
        </button>
        <button (click)="changePassword()"
            class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200 shadow cursor-pointer">
            <mat-icon>lock</mat-icon>
            Change Password
        </button>
    </div>

</section>
