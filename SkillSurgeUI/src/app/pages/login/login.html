<div class="min-h-screen flex items-center justify-center bg-linear-to-br from-gray-100 to-blue-200 font-inter">
  <div class="bg-white p-10 rounded-2xl shadow-lg w-full max-w-md text-center">
    <h2 class="text-gray-800 text-2xl font-semibold mb-2">Welcome Back</h2>
    <p class="text-gray-500 text-sm mb-8">Please enter your details</p>

    <form [formGroup]="formData" (ngSubmit)="handleSubmit()">

      <!-- Email -->
      <div class="text-left mb-6">
        <label class="block text-gray-700 text-sm font-semibold mb-2">Email</label>
        <input type="email" placeholder="hello@example.com" formControlName="email"
          class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition" />
      </div>

      <!-- Password -->
      <div class="text-left mb-6">
        <label class="block text-gray-700 text-sm font-semibold mb-2">Password</label>
        <input type="password" placeholder="••••••••" formControlName="password"
          class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition" />
      </div>

      <!-- Submit Button -->
      <app-button title="Login" type="submit" [disabled]="!formData.valid"></app-button>

    </form>

    <!-- Footer -->
    <div class="mt-6 text-sm text-gray-500">
      Don't have an account? 
      <a [routerLink]="['/signup']" class="text-primary font-semibold no-underline">Sign up</a>
    </div>
  </div>
</div>
