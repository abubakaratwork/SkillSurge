<div class="min-h-screen flex items-center justify-center bg-linear-to-br from-gray-100 to-blue-200 font-inter">
  <div class="bg-white p-10 rounded-2xl shadow-lg w-full max-w-md text-center">
    <h2 class="text-gray-800 text-2xl font-semibold mb-2">Create Account</h2>
    <p class="text-gray-500 text-sm mb-8">Join us and start your journey</p>

    <form [formGroup]="signupData" (ngSubmit)="handleSignup()">

      <!-- Name Row -->
      <div class="flex flex-col sm:flex-row gap-4 mb-6">
        <div class="flex-1 text-left">
          <label class="block text-gray-700 text-sm font-semibold mb-2">First Name</label>
          <input type="text" placeholder="John" formControlName="firstName"
            class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition placeholder-gray-400" />
        </div>
        <div class="flex-1 text-left">
          <label class="block text-gray-700 text-sm font-semibold mb-2">Last Name</label>
          <input type="text" placeholder="Doe" formControlName="lastName"
            class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition placeholder-gray-400" />
        </div>
      </div>

      <!-- Email -->
      <div class="text-left mb-6">
        <label class="block text-gray-700 text-sm font-semibold mb-2">Email</label>
        <input type="email" placeholder="john@example.com" formControlName="email"
          class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition placeholder-gray-400" />
      </div>

      <!-- Password -->
      <div class="text-left mb-6">
        <label class="block text-gray-700 text-sm font-semibold mb-2">Password</label>
        <input type="password" placeholder="Min. 8 characters" formControlName="password"
          class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition placeholder-gray-400" />
      </div>

      <!-- Checkbox -->
      <div class="w-full flex items-center gap-2 mb-6 text-left">
        <input type="checkbox" id="terms" formControlName="agreeTerms" class="cursor-pointer" />
        <label for="terms" class="text-gray-500 text-sm">
          I agree to the <a href="#" class="text-primary font-semibold no-underline">Terms & Conditions</a>
        </label>
      </div>

      <!-- Submit Button -->
      <app-button title="Create Account" type="submit" [disabled]="!signupData.valid"></app-button>

    </form>

    <!-- Footer -->
    <div class="mt-6 text-sm text-gray-500">
      Already have an account? 
      <a [routerLink]="['/login']" class="text-primary font-semibold no-underline">Log in</a>
    </div>
  </div>
</div>
