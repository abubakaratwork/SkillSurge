<section class="mt-12 px-6">

    <!-- Categories table -->
    <div class="overflow-x-auto">
        <table class="min-w-full border border-gray-200 rounded-lg overflow-hidden shadow-sm">
            <thead class="bg-gray-50">
                <tr class="text-left text-gray-700">
                    <th class="px-4 py-2 font-semibold text-nowrap">Name</th>
                    <th class="px-4 py-2 font-semibold text-nowrap">Description</th>
                </tr>
            </thead>

            <tbody class="bg-white divide-y divide-gray-200">
                @for(category of categories; track categories){
                <tr>
                    <td class="px-4 py-2 text-nowrap">
                        {{ category.name }}
                    </td>

                    <td class="px-4 py-2">
                        {{ category.description }}
                    </td>
                </tr>
                }

                @empty {
                <tr>
                    <td colspan="2" class="text-center py-6 text-gray-500">
                        No Categories Found
                    </td>
                </tr>
                }
            </tbody>
        </table>
    </div>

</section>
