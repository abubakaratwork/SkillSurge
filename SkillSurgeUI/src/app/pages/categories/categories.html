<section class="mt-12 px-6">

    <!-- Button to open Category modal -->
    <div class="flex justify-end mb-4">
        <button (click)="openModal()"
            class="bg-primary hover:bg-primary-hover text-white px-4 py-2 rounded-lg font-semibold transition-colors shadow-md hover:shadow-lg">
            Add Category
        </button>
    </div>

    <!-- Categories table -->
    <div class="overflow-x-auto">
        <table class="min-w-full border border-gray-200 rounded-lg overflow-hidden shadow-sm">
            <thead class="bg-gray-50">
                <tr class="text-left text-gray-700">
                    <th class="px-4 py-2 font-semibold text-nowrap">Name</th>
                    <th class="px-4 py-2 font-semibold text-nowrap">Description</th>
                    <!-- <th class="px-4 py-2 font-semibold text-nowrap">Active</th> -->
                    <th class="px-4 py-2 font-semibold text-nowrap">Created At</th>
                    <th class="px-4 py-2 font-semibold text-nowrap">Updated At</th>
                    <th class="px-4 py-2 font-semibold text-nowrap">Actions</th>
                </tr>
            </thead>

            <tbody class="bg-white divide-y divide-gray-200">

                @for(category of categories; track categories){

                <tr>
                    <td class="px-4 py-2 text-nowrap">{{ category.name }}</td>
                    <td class="px-4 py-2 text-nowrap">{{ category.description || '-' }}</td>
                    <!-- <td class="px-4 py-2 text-nowrap" [class]="category.isActive ? 'text-green-500' : 'text-red-500'">
                        <mat-icon>{{ category.isActive ? 'check' : 'close' }}</mat-icon>
                    </td> -->
                    <td class="px-4 py-2 text-nowrap">{{ category.createdAt | date:'dd-MMM-yyyy hh:mm a' }}</td>
                    <td class="px-4 py-2 text-nowrap">{{ category.updatedAt | date:'dd-MMM-yyyy hh:mm a' }}</td>
                    <td class="px-4 py-2 flex gap-2">
                        <!-- Edit -->
                        <button (click)="editCategory(category.id)"
                            class="bg-yellow-400 hover:bg-yellow-500 text-white px-1.5 py-1 rounded-lg transition-colors flex items-center justify-center">
                            <mat-icon>edit</mat-icon>
                        </button>

                        <!-- Delete -->
                        <button (click)="deleteCategoryById(category.id)"
                            class="bg-red-500 hover:bg-red-600 text-white px-1.5 py-1 rounded-lg transition-colors flex items-center justify-center">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </td>
                </tr>

                }
                @empty {
                <tr>
                    <td colspan="6" class="text-center py-6 text-gray-500">
                        No Category Found
                    </td>
                </tr>
                }

            </tbody>
        </table>
    </div>

</section>
