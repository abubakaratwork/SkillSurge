<section class="mt-12 px-6">

    <h2 class="text-2xl font-semibold mb-6 text-gray-900">Admin Dashboard Overview</h2>

    <!-- Dashboard summary cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">

        <!-- Total Users -->
        <div
            class="bg-white rounded-2xl shadow-sm p-6 flex flex-col justify-between border border-gray-200 hover:shadow-lg transition-all duration-300">
            <div>
                <p class="text-xs font-medium text-gray-400 uppercase mb-1 tracking-wider">Total Users</p>
                <p class="text-3xl font-bold text-gray-900">{{ totalUsers }}</p>
            </div>
            <mat-icon class="text-primary text-5xl mt-4">people</mat-icon>
        </div>

        <!-- Total Products -->
        <div
            class="bg-white rounded-2xl shadow-sm p-6 flex flex-col justify-between border border-gray-200 hover:shadow-lg transition-all duration-300">
            <div>
                <p class="text-xs font-medium text-gray-400 uppercase mb-1 tracking-wider">Total Products</p>
                <p class="text-3xl font-bold text-gray-900">{{ totalProducts }}</p>
            </div>
            <mat-icon class="text-green-500 text-5xl mt-4">inventory_2</mat-icon>
        </div>

        <!-- Total Categories -->
        <div
            class="bg-white rounded-2xl shadow-sm p-6 flex flex-col justify-between border border-gray-200 hover:shadow-lg transition-all duration-300">
            <div>
                <p class="text-xs font-medium text-gray-400 uppercase mb-1 tracking-wider">Total Categories</p>
                <p class="text-3xl font-bold text-gray-900">{{ totalCategories }}</p>
            </div>
            <mat-icon class="text-yellow-500 text-5xl mt-4">category</mat-icon>
        </div>

        <!-- Total Subcategories -->
        <div
            class="bg-white rounded-2xl shadow-sm p-6 flex flex-col justify-between border border-gray-200 hover:shadow-lg transition-all duration-300">
            <div>
                <p class="text-xs font-medium text-gray-400 uppercase mb-1 tracking-wider">Total Subcategories</p>
                <p class="text-3xl font-bold text-gray-900">{{ totalSubCategories }}</p>
            </div>
            <mat-icon class="text-red-500 text-5xl mt-4">subdirectory_arrow_right</mat-icon>
        </div>

    </div>

</section>
